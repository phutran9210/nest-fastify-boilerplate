services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    ports:
      - '5433:5432'
    volumes:
      # PG18+ khuyến nghị mount tại /var/lib/postgresql (data nằm trong thư mục con theo major version)
      - pgdata:/var/lib/postgresql

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    ports:
      - '6380:6379'

  rabbitmq:
    image: rabbitmq:4-management-alpine
    restart: unless-stopped
    ports:
      - '5673:5672'
      - '15673:15672'

volumes:
  pgdata:
