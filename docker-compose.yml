services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6380:6379'

  rabbitmq:
    image: rabbitmq:3-management
    restart: unless-stopped
    ports:
      - '5673:5672'
      - '15673:15672'

volumes:
  pgdata:
